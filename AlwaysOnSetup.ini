; ============================================================
; AlwaysOnSetup - Konfigurationsdatei
; ============================================================
;
; Diese Datei liegt im gleichen Verzeichnis wie AlwaysOnSetup.ps1
; und wird beim Start automatisch eingelesen.
;
; Syntax:
;   Schluessel=Wert
;   Zeilen die mit ; beginnen sind Kommentare und werden ignoriert.
;   Leerzeilen werden ignoriert.
;
; ============================================================
;
; AG_SYNC_JOB_NAME
; ----------------
; Name des SQL Agent Jobs fuer die AG-Synchronisation.
; Dieser Job wird auf beiden AG-Nodes angelegt und synchronisiert
; taeglich Logins, Agent-Jobs und Linked Server vom Primary
; zum Secondary Node.
;
; Hintergrund:
;   Manche Monitoring-Systeme (SCOM, Nagios, Zabbix, custom Scripts)
;   erkennen und ueberwachen SQL Agent Jobs anhand ihres Namens.
;   Hier kann ein firmenspezifischer Name hinterlegt werden damit
;   der Job vom Monitoring automatisch erkannt wird.
;
; Beispiele:
;   AG_SYNC_JOB_NAME=DBA_AlwaysOn_Sync
;   AG_SYNC_JOB_NAME=MON_AG_Sync_Logins_Jobs
;   AG_SYNC_JOB_NAME=FITS_AG_Sync
;
; Leer lassen oder Zeile auskommentieren:
;   Standardname wird verwendet: "AG Sync - Logins, Jobs, LinkedServer"
;
AG_SYNC_JOB_NAME=
;
; ============================================================
